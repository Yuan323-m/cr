<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="images/leather.jpg" alt="Background Texture" class="bg-image">

    <header class="navbar">
        <a class="nav-link" href="#">Need help?</a>
        <a href="#" class="login-status">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
            Log in
        </a>
    </header>

    <main class="main-container">
        <div class="login-card">
            <h1 class="card-title">Log in</h1>
            
            <form action="#" method="POST">
                <div class="options-list">
                    
                    <label class="login-option">
                        <input type="radio" name="login_method" value="google" checked>
                        <span class="option-text">Log in with Google/Gmail</span>
                    </label>

                    <label class="login-option">
                        <input type="radio" name="login_method" value="email">
                        <span class="option-text">Log in with Email</span>
                    </label>

                    <label class="login-option">
                        <input type="radio" name="login_method" value="facebook">
                        <span class="option-text">Log in with Facebook</span>
                    </label>
                    
                </div>

                <a href="overview.html" class="submit-btn">Continue</a>
            </form>
        </div>
    </main>

</body>
</html>
