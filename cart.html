<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Overview</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body class="cart-page-body">
    <header class="topbar">
        <button class="icon-button menu-button" type="button" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="topnav" aria-label="Primary">
            <a href="Overview.html#collection">Collection</a>
            <a href="Overview.html#about">About us</a>
            <a href="shop.html">Product</a>
            <a href="#contacts">Contacts</a>
        </nav>

        <div class="topbar-actions" aria-label="Quick actions">
    <a href="cart.html" class="icon-button" aria-label="Cart">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h-2l-1 2H1v2h2l3.6 7.59-1.35 2.44A2 2 0 0 0 7 21h12v-2H7.42a.25.25 0 0 1-.22-.37L8.1 17h7.45a2 2 0 0 0 1.79-1.11L21 8H6.21l-.94-2H21V4H7Zm1.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm9 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
        </svg>
    </a>
    
    <a href="#" class="icon-button" aria-label="Search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 4a6 6 0 1 0 3.87 10.59l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/>
        </svg>
    </a>
    
    <a href="login.html" class="icon-button" aria-label="Account">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2Zm0 3a3 3 0 1 1-3 3 3 3 0 0 1 3-3Zm0 14a7.93 7.93 0 0 1-5.24-1.98A5 5 0 0 1 17.24 17 7.93 7.93 0 0 1 12 19Z"/>
        </svg>
    </a>
</div>
    </header>

    <main>
        <div class="cart-wrapper">
            <div style="grid-column: 1 / -1;">
                <a href="#" class="back-link">← BACK</a>
                <h1 class="cart-page-title">Shopping Cart</h1>
            </div>

            <div class="cart-table-container">
                <div class="cart-table-header">
                    <div class="th-product">Product</div>
                    <div>Price</div>
                    <div>Quantity</div>
                </div>

                <div class="cart-item-row">
                    <div class="cart-item-meta">
                        <img src="images/sixthsh.jpg" alt="Five MU+ Leather Jacket" class="cart-item-img">
                        <span class="cart-item-title">Five MU+ Leather Jacket</span>
                    </div>
                    <div class="cart-item-price">₱2,500</div>
                    <div class="cart-qty-selector">
                        <button class="cart-qty-btn">+</button>
                        <span class="cart-qty-num">1</span>
                        <button class="cart-qty-btn">—</button>
                    </div>
                </div>
            </div>

            <aside class="summary-panel">
                <h2 class="summary-panel-title">Order Summary</h2>
                <div class="summary-voucher-container">
                    <button class="summary-voucher-btn">Apply Voucher</button>
                </div>
                <div class="summary-data-row">
                    <span>Sub Total:</span>
                    <span>2,500</span>
                </div>
                <div class="summary-data-row">
                    <span>Discount:</span>
                    <span>0</span>
                </div>
                <div class="summary-data-row">
                    <span>Shipping Fee:</span>
                    <span>50</span>
                </div>
                <div class="summary-total-row">
                    <span>TOTAL:</span>
                    <span>2,550</span>
                </div>
                <button class="summary-checkout-btn">Check Out</button>
            </aside>
        </div>
    </main>

    </body>
    <footer>

    <div class="footer-content">

        <h2>Let-her</h2>

        <p>
            Leather is the New Fashion.
        </p>


        <div class="footer-links">
            <a href="#collection">Collection</a>
            <a href="#about">About Us</a>
            <a href="#">Contacts</a>
        </div>


    </div>

</footer>
</html>
